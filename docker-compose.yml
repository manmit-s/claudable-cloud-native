services:
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: claudable-orchestrator
    restart: always
    ports:
      - "3000:3000"
      - "3100-3200:3100-3200"
    volumes:
      # Link the host's Docker socket to speak with host daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the data folder so that the orchestrator container can persist projects on host
      - ./data:/app/data
    env_file:
      - .env
